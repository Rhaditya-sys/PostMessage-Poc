<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>postMessage Tester</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}
#logs {
    white-space: pre-wrap;
    background: #111;
    color: #0f0;
    padding: 10px;
    height: 500px;
    overflow-y: auto;
}
</style>
</head>
<body>

<h2>PostMessage Listener</h2>

<button id="openBtn">Open Checkout</button>

<div id="logs"></div>

<script>
const logs = document.getElementById("logs");

function log(msg) {
    logs.textContent += msg + "\n";
}

document.getElementById("openBtn").onclick = () => {
    window.open(
        "https://shop.flexport.com/checkouts/cn/hWNDiWX0JK8WP3AseizxhoEU/en-id?_r=AQABC9qbdUROh9V9LlDs0jZFh6GUrcCnILJplo8wa_VbmoM&_su_rec=HW7-obz0wtTc59mbrxBMZwSuq0SlFh870OVmPeJ2EXbTu1UOUZQAI0XJTdtQDopnHYJ-vYey1fFzJ7DEKB5sDfvE9iwqK38pn5XHEUNldL6ipiIRVs1VmmiOZkeeUVlMERMgLIYPULJZslj2_zFDLV7Gz7cFbpPwGQMZ3N2e1wHSdAioMS1ehZII8WYY0UEqxcWyZa3xi8KawHoWtbGZhZI&auto_redirect=false&edge_redirect=true&skip_shop_pay=true",
        "_blank"
    );

    log("[+] Checkout opened");
};

window.addEventListener("message", (e) => {

    log("================================");
    log("ORIGIN: " + e.origin);

    try {
        log("DATA: " + JSON.stringify(e.data, null, 2));
    } catch {
        log("DATA: " + String(e.data));
    }

});
</script>

</body>
</html>
