<script>
const logConsole = document.getElementById("logConsole");

function log(msg) {
    console.log(msg);
    logConsole.textContent += msg + "\n";
}

function bukaTarget() {
    const urlTarget = "https://shop.flexport.com/";
    const win = window.open(urlTarget, "_blank");

    log("[+] Popup dibuka");
    log("[+] Window object: " + !!win);
}

window.addEventListener("message", function(event) {
    log("=================================");
    log("MESSAGE RECEIVED");
    log("ORIGIN: " + event.origin);

    try {
        log("DATA: " + JSON.stringify(event.data));
    } catch(e) {
        log("DATA: " + String(event.data));
    }

    console.log(event);
});
</script>
